<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Agenda Visios — NutriDoc Diététicien</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js" defer></script>
</head>
<body class="page-dietitian">

<header class="header">
  <a href="index.html" class="logo">Nutri<span>Doc</span></a>
  <nav class="nav">
    <a href="dietitian.html" class="nav-link">Dossiers</a>
    <a href="agenda-dieteticien.html" class="nav-link active">Agenda</a>
    <a href="compta-dieteticien.html" class="nav-link">Comptabilité</a>
  </nav>
  <div style="display:flex;align-items:center;gap:.75rem;">
    <div class="agenda-legend">
      <span class="leg-dot" style="background:#1D9E75;"></span>Confirmée
      <span class="leg-dot" style="background:#f59e0b;margin-left:.5rem;"></span>En attente
      <span class="leg-dot" style="background:#e5e7eb;margin-left:.5rem;"></span>Disponible
    </div>
    <span class="user-tag pro">Dr. Lemaire</span>
  </div>
</header>

<main class="agenda-main">

  <!-- ── Barre outils ──────────────────────────────── -->
  <div class="agenda-toolbar">
    <div class="agenda-toolbar-left">
      <button class="agenda-btn-today" onclick="goToday()">Aujourd'hui</button>
      <button class="agenda-nav-btn" onclick="navigate(-1)">‹</button>
      <button class="agenda-nav-btn" onclick="navigate(1)">›</button>
      <h2 class="agenda-title" id="agendaTitle"></h2>
    </div>
    <div class="agenda-toolbar-right">
      <div class="agenda-view-tabs">
        <button class="agenda-view-tab active" id="tabJour"    onclick="setView('day')">Jour</button>
        <button class="agenda-view-tab"         id="tabSemaine" onclick="setView('week')">Semaine</button>
        <button class="agenda-view-tab"         id="tabMois"   onclick="setView('month')">Mois</button>
      </div>
      <button class="agenda-btn-add" onclick="openAddSlot()">+ Créneau</button>
    </div>
  </div>

  <!-- ── Vues ─────────────────────────────────────── -->
  <div class="agenda-body">
    <div id="viewDay"   class="agenda-view"></div>
    <div id="viewWeek"  class="agenda-view hidden"></div>
    <div id="viewMonth" class="agenda-view hidden"></div>
  </div>

  <!-- ── Stats rapides ────────────────────────────── -->
  <div class="agenda-stats-row" id="agendaStats"></div>

</main>

<!-- Tooltip patient -->
<div class="patient-tooltip" id="patientTooltip"></div>

<!-- Modal ajout créneau -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <h3 id="modalTitle">Nouveau créneau</h3>
      <button class="modal-close" onclick="closeModalForce()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ── DONNÉES ─────────────────────────────────────────────────
const PRIX_VISIO = 55;    // Patient paie
const REV_DIET   = 49;    // Diét. reçoit

const PATIENTS_DEMO = [
  { id:'p1', prenom:'Marie',   nom:'Dupont',  age:34, objectif:'Perte de poids', email:'marie.d@mail.fr',  tel:'06 12 34 56 78', avatar:'#1D9E75' },
  { id:'p2', prenom:'Thomas',  nom:'Klein',   age:28, objectif:'Prise de masse', email:'t.klein@mail.fr',  tel:'06 98 76 54 32', avatar:'#5DCAA5' },
  { id:'p3', prenom:'Sophie',  nom:'Martin',  age:41, objectif:'Équilibre',      email:'soph.m@mail.fr',   tel:'07 11 22 33 44', avatar:'#97C459' },
  { id:'p4', prenom:'Lucas',   nom:'Bernard', age:25, objectif:'Sport & perf.',  email:'lucas.b@mail.fr',  tel:'06 55 66 77 88', avatar:'#f59e0b' },
];

// Créneaux: clé = "YYYY-MM-DD_HH:MM" → objet slot
const slots = {};

// Pré-remplir des créneaux démo
function initDemoSlots() {
  const today = new Date();
  const base  = new Date(today);
  base.setHours(0,0,0,0);

  const add = (offsetDays, hour, min, patientIdx, statut = 'confirme') => {
    const d = new Date(base);
    d.setDate(d.getDate() + offsetDays);
    const key = dateKey(d) + `_${String(hour).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
    slots[key] = {
      date:    new Date(d),
      heure:   `${String(hour).padStart(2,'0')}:${String(min).padStart(2,'0')}`,
      duree:   45,
      patient: patientIdx !== null ? PATIENTS_DEMO[patientIdx] : null,
      statut,
      prix:    PRIX_VISIO,
      notes:   ''
    };
  };

  add(0,  9,  0, 0, 'confirme');
  add(0, 10, 45, 1, 'confirme');
  add(0, 14,  0, 2, 'attente');
  add(0, 15, 45, null, 'libre');
  add(1,  9,  0, 3, 'confirme');
  add(1, 11,  0, null, 'libre');
  add(1, 14,  0, null, 'libre');
  add(1, 15, 45, 0, 'attente');
  add(2, 10,  0, null, 'libre');
  add(2, 14, 30, 1, 'confirme');
  add(3,  9,  0, 2, 'confirme');
  add(3, 15,  0, null, 'libre');
  add(-1, 10, 0, 3, 'confirme');
  add(-1, 14, 0, 0, 'confirme');
  add(-2,  9, 0, 1, 'confirme');
  add(-3, 11, 0, 2, 'confirme');
}

// ── ÉTAT ─────────────────────────────────────────────────────
let currentView  = 'week';
let currentDate  = new Date();
let draggedSlot  = null;
let dragSource   = null;

function dateKey(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function slotKey(date, heure) { return dateKey(date) + '_' + heure; }
function parseDate(dk) {
  const [y,m,d] = dk.split('-').map(Number);
  return new Date(y, m-1, d);
}

const HEURES = [];
for (let h = 8; h <= 19; h++) {
  HEURES.push(`${String(h).padStart(2,'0')}:00`);
  HEURES.push(`${String(h).padStart(2,'0')}:45`);
}
const HEURES_DISPLAY = [];
for (let h = 8; h <= 19; h++) HEURES_DISPLAY.push(`${String(h).padStart(2,'0')}:00`);

const JOURS_COURTS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MOIS_LONGS   = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

// ── COULEURS STATUTS ─────────────────────────────────────────
const STATUT_COLORS = {
  confirme:  { bg: '#E1F5EE', border: '#1D9E75', text: '#0f6e56', dot: '#1D9E75', badge:'Confirmée'  },
  attente:   { bg: '#FFF8E6', border: '#f59e0b', text: '#92400e', dot: '#f59e0b', badge:'En attente' },
  libre:     { bg: '#F3F4F6', border: '#d1d5db', text: '#6b7280', dot: '#9ca3af', badge:'Disponible' },
  passe:     { bg: '#F9FAFB', border: '#e5e7eb', text: '#9ca3af', dot: '#d1d5db', badge:'Passée'     },
};

function getStatut(slot) {
  const now = new Date();
  const slotDate = new Date(slot.date);
  slotDate.setHours(...slot.heure.split(':').map(Number));
  if (slotDate < now && slot.statut !== 'libre') return 'passe';
  return slot.statut;
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  updateTitle();
  updateStats();
  if (currentView === 'day')   renderDay();
  if (currentView === 'week')  renderWeek();
  if (currentView === 'month') renderMonth();
}

function updateTitle() {
  const mo = MOIS_LONGS[currentDate.getMonth()];
  const yr = currentDate.getFullYear();
  if (currentView === 'day') {
    const wd = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    document.getElementById('agendaTitle').textContent = wd[currentDate.getDay()] + ' ' + currentDate.getDate() + ' ' + mo + ' ' + yr;
  } else if (currentView === 'week') {
    const { start, end } = weekBounds(currentDate);
    document.getElementById('agendaTitle').textContent = start.getDate() + ' – ' + end.getDate() + ' ' + mo + ' ' + yr;
  } else {
    document.getElementById('agendaTitle').textContent = mo + ' ' + yr;
  }
}

function updateStats() {
  const todayKey = dateKey(new Date());
  const todaySlots = Object.entries(slots).filter(([k]) => k.startsWith(todayKey)).map(([,v]) => v);
  const confirmes  = todaySlots.filter(s => s.statut === 'confirme').length;
  const attente    = todaySlots.filter(s => s.statut === 'attente').length;
  const rev        = confirmes * REV_DIET;
  // Semaine
  const { start, end } = weekBounds(new Date());
  let weekRev = 0, weekCount = 0;
  Object.entries(slots).forEach(([k, s]) => {
    const d = parseDate(k.split('_')[0]);
    if (d >= start && d <= end && s.statut === 'confirme') { weekRev += REV_DIET; weekCount++; }
  });
  document.getElementById('agendaStats').innerHTML = `
    <div class="agenda-stat"><div class="agenda-stat-val">${confirmes}</div><div class="agenda-stat-label">Confirmées aujourd'hui</div></div>
    <div class="agenda-stat"><div class="agenda-stat-val" style="color:#f59e0b">${attente}</div><div class="agenda-stat-label">En attente aujourd'hui</div></div>
    <div class="agenda-stat"><div class="agenda-stat-val">${rev} €</div><div class="agenda-stat-label">Revenus aujourd'hui (${REV_DIET}€/visio)</div></div>
    <div class="agenda-stat"><div class="agenda-stat-val">${weekCount}</div><div class="agenda-stat-label">Visios cette semaine</div></div>
    <div class="agenda-stat"><div class="agenda-stat-val">${weekRev} €</div><div class="agenda-stat-label">Revenus cette semaine</div></div>
  `;
}

// ── VUE JOUR ─────────────────────────────────────────────────
function renderDay() {
  const view = document.getElementById('viewDay');
  const dk   = dateKey(currentDate);
  view.innerHTML = `
    <div class="agenda-time-grid">
      <div class="agenda-time-col">
        ${HEURES_DISPLAY.map(h => `<div class="agenda-time-label">${h}</div>`).join('')}
      </div>
      <div class="agenda-day-col" id="dayCol_${dk}" data-date="${dk}"
        ondragover="onDragOver(event)" ondrop="onDrop(event,'${dk}')">
        ${renderTimeSlots(dk)}
      </div>
    </div>`;
  addDropZones();
}

// ── VUE SEMAINE ───────────────────────────────────────────────
function renderWeek() {
  const view = document.getElementById('viewWeek');
  const { start } = weekBounds(currentDate);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(d.getDate() + i);
    days.push(d);
  }
  view.innerHTML = `
    <div class="agenda-time-grid agenda-week-grid">
      <div class="agenda-time-col">
        <div class="agenda-week-corner"></div>
        ${HEURES_DISPLAY.map(h => `<div class="agenda-time-label">${h}</div>`).join('')}
      </div>
      ${days.map(d => {
        const dk    = dateKey(d);
        const today = dateKey(new Date()) === dk;
        return `
          <div class="agenda-week-day-col">
            <div class="agenda-week-header ${today ? 'today' : ''}">
              <span class="agenda-week-day-name">${JOURS_COURTS[d.getDay() === 0 ? 6 : d.getDay()-1]}</span>
              <span class="agenda-week-day-num ${today ? 'today-num' : ''}">${d.getDate()}</span>
            </div>
            <div class="agenda-day-col" id="dayCol_${dk}" data-date="${dk}"
              ondragover="onDragOver(event)" ondrop="onDrop(event,'${dk}')">
              ${renderTimeSlots(dk)}
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

// ── VUE MOIS ──────────────────────────────────────────────────
function renderMonth() {
  const view = document.getElementById('viewMonth');
  const yr   = currentDate.getFullYear();
  const mo   = currentDate.getMonth();
  const first = new Date(yr, mo, 1);
  const last  = new Date(yr, mo+1, 0);
  let startDow = first.getDay(); // 0=dim
  startDow = startDow === 0 ? 6 : startDow - 1;

  let cells = '';
  // Vides
  for (let i = 0; i < startDow; i++) cells += `<div class="month-cell month-empty"></div>`;
  for (let d = 1; d <= last.getDate(); d++) {
    const date    = new Date(yr, mo, d);
    const dk      = dateKey(date);
    const today   = dateKey(new Date()) === dk;
    const daySlots = Object.entries(slots).filter(([k]) => k.startsWith(dk)).map(([,v]) => v);
    const nb = daySlots.length;
    const nbConf  = daySlots.filter(s => s.statut === 'confirme').length;
    const nbAtt   = daySlots.filter(s => s.statut === 'attente').length;
    cells += `
      <div class="month-cell ${today ? 'month-today' : ''}" onclick="goDay(${yr},${mo},${d})">
        <div class="month-cell-num ${today ? 'today-num' : ''}">${d}</div>
        ${nb > 0 ? `<div class="month-slots-preview">
          ${nbConf > 0 ? `<div class="month-slot-dot confirme">${nbConf} visio${nbConf>1?'s':''}</div>` : ''}
          ${nbAtt  > 0 ? `<div class="month-slot-dot attente">${nbAtt} en att.</div>` : ''}
          ${nb - nbConf - nbAtt > 0 ? `<div class="month-slot-dot libre">${nb-nbConf-nbAtt} libre${nb-nbConf-nbAtt>1?'s':''}</div>` : ''}
        </div>` : ''}
      </div>`;
  }

  view.innerHTML = `
    <div class="month-grid-wrap">
      <div class="month-weekdays">
        ${JOURS_COURTS.map(j => `<div class="month-wd">${j}</div>`).join('')}
      </div>
      <div class="month-grid">${cells}</div>
    </div>`;
}

// ── BLOCS CRÉNEAUX ────────────────────────────────────────────
function renderTimeSlots(dk) {
  const daySlots = Object.entries(slots)
    .filter(([k]) => k.startsWith(dk))
    .map(([k, v]) => ({ key: k, ...v }));

  let html = '';
  HEURES.forEach((h, idx) => {
    const sk    = dk + '_' + h;
    const slot  = slots[sk];
    const top   = idx * 36; // 36px par slot 45min

    if (slot) {
      const statut  = getStatut(slot);
      const colors  = STATUT_COLORS[statut];
      const patient = slot.patient;
      const initials = patient
        ? (patient.prenom[0] + patient.nom[0]).toUpperCase()
        : null;
      const tooltipData = patient
        ? `data-patient='${JSON.stringify(patient).replace(/'/g,"&#39;")}'`
        : '';

      html += `
        <div class="agenda-slot-block ${statut}"
          style="top:${top}px;background:${colors.bg};border-color:${colors.border};"
          draggable="true"
          ondragstart="onDragStart(event,'${sk}')"
          ondragend="onDragEnd()"
          onmouseenter="showTooltip(event,'${sk}')"
          onmouseleave="hideTooltip()"
          onclick="openEditSlot('${sk}')"
          ${tooltipData}>
          <div class="slot-block-inner">
            ${patient ? `
              <div class="slot-avatar" style="background:${patient.avatar};color:#fff;">${initials}</div>
              <div class="slot-info">
                <div class="slot-name">${patient.prenom} ${patient.nom}</div>
                <div class="slot-meta">${slot.heure} · 45 min · ${PRIX_VISIO}€</div>
              </div>` : `
              <div class="slot-info">
                <div class="slot-name libre">Créneau libre</div>
                <div class="slot-meta">${slot.heure} · 45 min</div>
              </div>`}
            <div class="slot-status-badge" style="background:${colors.border};color:#fff;">${colors.badge}</div>
          </div>
        </div>`;
    } else {
      // Zone de dépôt vide
      html += `
        <div class="agenda-drop-zone"
          style="top:${top}px;"
          data-date="${dk}"
          data-heure="${h}"
          ondragover="onDragOver(event)"
          ondrop="onDrop(event,'${dk}','${h}')"
          onclick="openAddSlotAt('${dk}','${h}')">
          <span class="drop-zone-hint">+ ${h}</span>
        </div>`;
    }
  });
  return html;
}

// ── DRAG & DROP ───────────────────────────────────────────────
function onDragStart(e, key) {
  draggedSlot  = key;
  dragSource   = key;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '.45';
}
function onDragEnd() {
  document.querySelectorAll('.agenda-slot-block').forEach(el => el.style.opacity = '');
  document.querySelectorAll('.agenda-drop-zone').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (e.currentTarget.classList.contains('agenda-drop-zone'))
    e.currentTarget.classList.add('drag-over');
}
function onDrop(e, dk, heure) {
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  if (!draggedSlot) return;

  const source   = slots[draggedSlot];
  if (!source)   return;

  // Nouvelle clé
  const newHeure = heure || e.currentTarget.dataset.heure || source.heure;
  const newDk    = dk;
  const newKey   = newDk + '_' + newHeure;

  if (newKey === draggedSlot) { draggedSlot = null; return; }
  if (slots[newKey] && slots[newKey].statut !== 'libre') {
    showNotif('Ce créneau est déjà occupé.', 'error');
    draggedSlot = null; return;
  }

  slots[newKey] = { ...source, date: parseDate(newDk), heure: newHeure };
  delete slots[draggedSlot];
  draggedSlot = null;
  render();
  showNotif('Créneau déplacé avec succès.', 'success');
}

// ── TOOLTIP ───────────────────────────────────────────────────
let tooltipTimeout;
function showTooltip(e, key) {
  const slot = slots[key];
  if (!slot) return;
  clearTimeout(tooltipTimeout);
  tooltipTimeout = setTimeout(() => {
    const p   = slot.patient;
    const tt  = document.getElementById('patientTooltip');
    const statut = getStatut(slot);
    const colors = STATUT_COLORS[statut];
    tt.innerHTML = p ? `
      <div class="tt-header" style="border-left:3px solid ${p.avatar};">
        <div class="tt-avatar" style="background:${p.avatar}">${p.prenom[0]+p.nom[0]}</div>
        <div>
          <div class="tt-name">${p.prenom} ${p.nom}</div>
          <div class="tt-age">${p.age} ans · ${p.objectif}</div>
        </div>
      </div>
      <div class="tt-detail"><span>📧</span>${p.email}</div>
      <div class="tt-detail"><span>📞</span>${p.tel}</div>
      <div class="tt-detail"><span>⏱</span>${slot.heure} · 45 min</div>
      <div class="tt-detail"><span>💶</span>${PRIX_VISIO} € patient · ${REV_DIET} € reversé</div>
      <div class="tt-badge" style="background:${colors.bg};color:${colors.text};border:1px solid ${colors.border};">${colors.badge}</div>
    ` : `
      <div class="tt-name">Créneau disponible</div>
      <div class="tt-detail"><span>⏱</span>${slot.heure} · 45 min</div>
      <div class="tt-detail"><span>💶</span>${PRIX_VISIO} € · Réservable par un patient</div>
    `;
    const rect = e.currentTarget.getBoundingClientRect();
    tt.style.left = Math.min(rect.right + 10, window.innerWidth - 260) + 'px';
    tt.style.top  = Math.max(rect.top - 20, 10) + 'px';
    tt.classList.add('visible');
  }, 200);
}
function hideTooltip() {
  clearTimeout(tooltipTimeout);
  document.getElementById('patientTooltip').classList.remove('visible');
}

// ── MODALS ────────────────────────────────────────────────────
function openAddSlot() {
  const dk = dateKey(currentDate);
  openAddSlotAt(dk, '09:00');
}
function openAddSlotAt(dk, heure) {
  document.getElementById('modalTitle').textContent = 'Nouveau créneau';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="mDate" value="${dk}" style="width:100%"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Heure de début</label>
        <select id="mHeure" style="width:100%" class="calc-select">
          ${HEURES.map(h => `<option value="${h}" ${h===heure?'selected':''}>${h}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Durée</label>
        <select id="mDuree" class="calc-select" style="width:100%">
          <option value="45" selected>45 min (standard)</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Patient (optionnel)</label>
      <select id="mPatient" class="calc-select" style="width:100%">
        <option value="">— Créneau libre —</option>
        ${PATIENTS_DEMO.map(p => `<option value="${p.id}">${p.prenom} ${p.nom}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>Statut</label>
      <select id="mStatut" class="calc-select" style="width:100%">
        <option value="libre">Disponible</option>
        <option value="confirme">Confirmée</option>
        <option value="attente">En attente</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes internes</label>
      <textarea id="mNotes" placeholder="Notes visibles uniquement par vous..." style="min-height:50px;width:100%;"></textarea>
    </div>
    <div class="form-group" style="background:#f9fafb;padding:.75rem;border-radius:8px;">
      <div style="display:flex;justify-content:space-between;font-size:.82rem;">
        <span style="color:var(--gray);">Prix patient</span><strong>${PRIX_VISIO} €</strong>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.82rem;margin-top:4px;">
        <span style="color:var(--gray);">Votre rémunération</span><strong style="color:var(--green);">${REV_DIET} €</strong>
      </div>
    </div>
    <div class="btn-row" style="margin-top:1rem;">
      <button class="btn-validate" onclick="saveSlot()">Enregistrer</button>
      <button class="btn-back" onclick="closeModalForce()">Annuler</button>
    </div>`;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function openEditSlot(key) {
  const slot = slots[key];
  if (!slot) return;
  document.getElementById('modalTitle').textContent = 'Modifier le créneau';
  document.getElementById('modalBody').innerHTML = `
    <input type="hidden" id="mEditKey" value="${key}"/>
    <div class="form-group">
      <label>Heure</label>
      <select id="mHeure" class="calc-select" style="width:100%">
        ${HEURES.map(h => `<option value="${h}" ${h===slot.heure?'selected':''}>${h}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>Patient</label>
      <select id="mPatient" class="calc-select" style="width:100%">
        <option value="">— Créneau libre —</option>
        ${PATIENTS_DEMO.map(p => `<option value="${p.id}" ${slot.patient?.id===p.id?'selected':''}>${p.prenom} ${p.nom}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>Statut</label>
      <select id="mStatut" class="calc-select" style="width:100%">
        ${['libre','confirme','attente'].map(s => `<option value="${s}" ${slot.statut===s?'selected':''}>${{libre:'Disponible',confirme:'Confirmée',attente:'En attente'}[s]}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="mNotes" style="min-height:50px;width:100%;">${slot.notes||''}</textarea>
    </div>
    ${slot.patient ? `
      <div style="background:var(--green-light);border-radius:8px;padding:.75rem;font-size:.82rem;">
        <strong>Rejoindre la visio</strong><br>
        <a href="#" style="color:var(--green);">https://meet.nutridoc.fr/${slot.patient.id}</a>
      </div>` : ''}
    <div class="btn-row" style="margin-top:1rem;justify-content:space-between;">
      <button class="btn-submit" style="background:#ef4444;border-color:#ef4444;font-size:.8rem;" onclick="deleteSlot('${key}')">Supprimer</button>
      <div style="display:flex;gap:.5rem;">
        <button class="btn-validate" onclick="updateSlot()">Enregistrer</button>
        <button class="btn-back" onclick="closeModalForce()">Annuler</button>
      </div>
    </div>`;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function saveSlot() {
  const dk      = document.getElementById('mDate')?.value    || dateKey(currentDate);
  const heure   = document.getElementById('mHeure').value;
  const patId   = document.getElementById('mPatient').value;
  const statut  = document.getElementById('mStatut').value;
  const notes   = document.getElementById('mNotes').value;
  const patient = patId ? PATIENTS_DEMO.find(p => p.id === patId) : null;
  const key     = dk + '_' + heure;
  slots[key] = { date: parseDate(dk), heure, duree: 45, patient, statut, notes, prix: PRIX_VISIO };
  closeModalForce(); render();
  showNotif('Créneau ajouté.', 'success');
}
function updateSlot() {
  const key     = document.getElementById('mEditKey').value;
  const heure   = document.getElementById('mHeure').value;
  const patId   = document.getElementById('mPatient').value;
  const statut  = document.getElementById('mStatut').value;
  const notes   = document.getElementById('mNotes').value;
  const patient = patId ? PATIENTS_DEMO.find(p => p.id === patId) : null;
  const dk      = key.split('_')[0];
  const newKey  = dk + '_' + heure;
  if (newKey !== key) delete slots[key];
  slots[newKey] = { ...slots[key], heure, patient, statut, notes };
  closeModalForce(); render();
  showNotif('Créneau mis à jour.', 'success');
}
function deleteSlot(key) {
  if (!confirm('Supprimer ce créneau ?')) return;
  delete slots[key];
  closeModalForce(); render();
  showNotif('Créneau supprimé.', 'error');
}

function closeModal(e) { if (e.target.id === 'modalOverlay') closeModalForce(); }
function closeModalForce() { document.getElementById('modalOverlay').classList.add('hidden'); }

// ── NAVIGATION ────────────────────────────────────────────────
function navigate(delta) {
  if (currentView === 'day')   currentDate.setDate(currentDate.getDate() + delta);
  if (currentView === 'week')  currentDate.setDate(currentDate.getDate() + delta * 7);
  if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + delta);
  render();
}
function goToday() { currentDate = new Date(); render(); }
function goDay(yr, mo, d) { currentDate = new Date(yr, mo, d); setView('day'); }

function setView(v) {
  currentView = v;
  ['day','week','month'].forEach(vv => {
    document.getElementById('view' + vv.charAt(0).toUpperCase() + vv.slice(1)).classList.toggle('hidden', vv !== v);
    document.getElementById('tab' + { day:'Jour', week:'Semaine', month:'Mois' }[vv]).classList.toggle('active', vv === v);
  });
  render();
}

function weekBounds(d) {
  const dow   = d.getDay();
  const diff  = dow === 0 ? -6 : 1 - dow;
  const start = new Date(d); start.setDate(d.getDate() + diff); start.setHours(0,0,0,0);
  const end   = new Date(start); end.setDate(start.getDate() + 6);
  return { start, end };
}

function addDropZones() {} // zones déjà dans renderTimeSlots

// ── NOTIF TOAST ───────────────────────────────────────────────
function showNotif(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'agenda-toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.classList.add('visible'), 10);
  setTimeout(() => { el.classList.remove('visible'); setTimeout(() => el.remove(), 300); }, 2500);
}

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initDemoSlots();
  setView('week');
});
</script>

/* Ligne heure */
.agenda-day-col::before { content:'';position:absolute;top:0;left:0;right:0;bottom:0;background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent 71px,rgba(0,0,0,.05) 71px,rgba(0,0,0,.05) 72px); }

.agenda-slot-block {
