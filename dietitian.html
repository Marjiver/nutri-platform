<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Espace diététicien — NutriPlan</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
</head>
<body class="page-dietitian">

  <header class="header">
    <a href="index.html" class="logo">Nutri<span>Plan</span></a>
    <nav class="nav"><span class="user-tag pro">Dr. Lemaire — Diététicien</span></nav>
  </header>

  <main class="dashboard-container">
    <div class="dashboard-greeting">
      <h2>Dossiers à valider</h2>
      <p>Modifiez et validez les plans alimentaires avec grammages et bilan nutritionnel complet.</p>
      <div class="delai-banner" style="max-width:480px;margin-top:.75rem;">
        <div class="delai-icon">⏱</div>
        <div>
          <div class="delai-title">Engagement : plans validés sous 48h max jours ouvrés</div>
          <div class="delai-sub">Le patient est notifié dès votre validation</div>
        </div>
      </div>
    </div>
    <div id="alertesZone"></div>
    <div class="patients-list" id="patientsList"></div>
  </main>

  <!-- MODAL ÉDITEUR -->
  <div id="modalEditeur" style="display:none;position:absolute;top:0;left:0;right:0;min-height:100vh;background:rgba(0,0,0,0.5);padding:32px 1rem;z-index:200;">
    <div style="background:#fff;border-radius:var(--radius);max-width:820px;margin:0 auto;overflow:hidden;">
      <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#fafafa;">
        <h3 id="editeurTitre" style="font-family:var(--font-display);font-size:1.15rem;margin:0;"></h3>
        <button class="btn-back" onclick="fermerEditeur()">✕ Fermer</button>
      </div>
      <div style="padding:1.25rem 1.5rem;max-height:78vh;overflow-y:auto;" id="editeurBody"></div>
      <div style="padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.75rem;justify-content:flex-end;background:#fafafa;">
        <button class="btn-back" onclick="fermerEditeur()">Annuler</button>
        <button class="btn-validate" onclick="validerPlan()">✓ Valider et envoyer au patient</button>
      </div>
    </div>
  </div>

  <!-- MODAL CIQUAL -->
  <div id="modalCiqual" style="display:none;position:absolute;top:0;left:0;right:0;min-height:100vh;background:rgba(0,0,0,0.65);padding:24px 1rem;z-index:300;">
    <div style="background:#fff;border-radius:var(--radius);max-width:820px;margin:0 auto;overflow:hidden;">
      <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <div id="ciqualGroupLabel" style="font-size:0.95rem;font-weight:500;"></div>
        <button class="btn-back" onclick="fermerCiqual()">✕</button>
      </div>
      <div id="ciqualTabs" style="display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--border);padding:0 1rem;background:#fafafa;"></div>
      <div id="ciqualBody" style="max-height:55vh;overflow-y:auto;"></div>
    </div>
  </div>

  <script src="js/ciqual-data.js"></script>
  <script src="js/dietitian.js"></script>
</body>
</html>
