<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>NutriDoc — Plateforme nutritionnelle certifiée · CaliDoc Santé</title>
  <meta name="description" content="Bilan nutritionnel gratuit · Plan alimentaire avec grammages précis validé par un diététicien certifié RPPS. Livré sous 48h."/>
  <meta name="author" content="CaliDoc Santé"/>
  <meta name="theme-color" content="#0d2018"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://nutridoc.calidoc-sante.fr/"/>
  <meta property="og:title" content="NutriDoc — Bilan nutritionnel gratuit"/>
  <meta property="og:description" content="Plan alimentaire validé par un diététicien RPPS en 48h"/>
  <meta property="og:image" content="assets/images/og-image.jpg"/>
  <meta property="twitter:card" content="summary_large_image"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="NutriDoc"/>
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --green:#1D9E75;--green2:#0f6e56;--green3:#5DCAA5;--green-light:#E1F5EE;
      --dark:#0d2018;--gray:#6b7280;--border:#e5e7eb;
      --bg-primary:#ffffff;--bg-secondary:#f7f9f7;--bg-card:#ffffff;
      --text-primary:#0d2018;--text-secondary:#4b5563;--text-muted:#6b7280;
      --border-color:#e5e7eb;
      --shadow:0 1px 2px 0 rgba(0,0,0,.05);
      --shadow-md:0 4px 6px -1px rgba(0,0,0,.1);
      --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1);
    }
    body{font-family:'Outfit',sans-serif;background:var(--bg-secondary);color:var(--text-primary);line-height:1.5;}
    *{transition:background-color .2s ease,border-color .2s ease,color .2s ease;}

    /* HEADER */
    .nd-header{position:fixed;top:0;left:0;right:0;z-index:100;background:#0d2018;border-bottom:1px solid rgba(29,158,117,.2);padding:.75rem 2rem;transition:all .3s;}
    .header-container{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
    .header-left{display:flex;align-items:center;gap:2rem;}
    .nd-logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;text-decoration:none;}
    .nd-logo em{font-style:italic;color:#5DCAA5;}
    .nd-nav{display:flex;gap:1.5rem;}
    .nd-navlink{font-size:.8rem;color:rgba(255,255,255,.65);text-decoration:none;transition:color .2s;}
    .nd-navlink:hover{color:#fff;}
    .gregoire-mini{position:relative;display:flex;align-items:center;gap:.5rem;background:rgba(29,158,117,.1);padding:.25rem .8rem;border-radius:999px;border:1px solid rgba(29,158,117,.2);cursor:help;}
    .gregoire-mini:hover .tooltip-text{visibility:visible;opacity:1;}
    .tooltip-text{visibility:hidden;opacity:0;width:250px;background:var(--bg-primary);color:#5DCAA5;text-align:center;border-radius:10px;padding:.6rem;position:absolute;z-index:1000;top:100%;left:50%;transform:translateX(-50%);margin-top:10px;font-size:.7rem;border:1px solid #1D9E75;transition:opacity .3s;pointer-events:none;}
    .gregoire-mini-avatar{width:28px;height:28px;background:linear-gradient(135deg,#1D9E75,#0f6e56);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;}
    .gregoire-mini-text{font-size:.65rem;color:rgba(255,255,255,.7);}
    .gregoire-mini-text strong{color:#5DCAA5;}
    .header-actions{display:flex;align-items:center;gap:1rem;}
    .nd-btn-ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:.4rem 1rem;color:#fff;font-size:.75rem;cursor:pointer;font-family:'Outfit',sans-serif;}
    .nd-btn-primary{background:#1D9E75;color:#fff;padding:.4rem 1.2rem;border-radius:999px;font-size:.75rem;font-weight:500;text-decoration:none;}
    .nd-btn-primary:hover{background:#0f6e56;}
    .nd-conn-wrap{position:relative;}
    .nd-conn-menu{display:none;position:absolute;top:100%;right:0;background:var(--bg-primary);border:1px solid rgba(29,158,117,.2);border-radius:12px;width:200px;margin-top:.5rem;z-index:101;overflow:hidden;}
    .nd-conn-menu.open{display:block;}
    .nd-conn-item{display:block;padding:.5rem 1rem;color:rgba(255,255,255,.7);text-decoration:none;font-size:.75rem;}
    .nd-conn-item:hover{background:rgba(29,158,117,.1);color:#fff;}
    @media(max-width:900px){.nd-header{padding:.75rem 1rem;}.nd-nav{display:none;}.gregoire-mini{display:none;}}

    /* PROFIL BAR */
    .nd-hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(13,32,24,.7) 0%,rgba(13,32,24,.2) 55%,transparent 100%);z-index:0;}
    .nd-hero-content{position:relative;z-index:2;flex:1;min-width:0;max-width:560px;text-align:center;}
    @media(min-width:901px){.nd-hero-content{text-align:left;}}
    .nd-hero-eyebrow{display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.7rem;color:#5DCAA5;margin-bottom:1rem;}
    @media(min-width:901px){.nd-hero-eyebrow{justify-content:flex-start;}}
    .nd-dot-pulse{width:6px;height:6px;background:#5DCAA5;border-radius:50%;animation:pulseGreen 2s infinite;}
    @keyframes pulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(93,202,165,.5);}50%{box-shadow:0 0 0 6px rgba(93,202,165,0);}}
    .nd-hero-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4.5vw,3.2rem);line-height:1.1;color:#fff;margin-bottom:1rem;}
    .nd-hero-title em{font-style:italic;color:#5DCAA5;}
    .nd-hero-sub{font-size:.95rem;color:rgba(255,255,255,.7);margin-bottom:1.5rem;line-height:1.6;max-width:500px;margin-left:auto;margin-right:auto;}
    @media(min-width:901px){.nd-hero-sub{margin-left:0;margin-right:0;}}
    .nd-hero-ctas{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;justify-content:center;}
    @media(min-width:901px){.nd-hero-ctas{justify-content:flex-start;}}
    .nd-cta-main{background:#1D9E75;color:#fff;padding:.7rem 1.5rem;border-radius:999px;text-decoration:none;font-size:.85rem;font-weight:500;transition:background .2s;}
    .nd-cta-main:hover{background:#0f6e56;}
    .nd-cta-ghost{color:rgba(255,255,255,.6);text-decoration:none;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.3);transition:color .2s;align-self:center;}
    .nd-cta-ghost:hover{color:#fff;}
    .nd-hero-trust{display:flex;gap:1.5rem;margin-bottom:1.5rem;justify-content:center;}
    @media(min-width:901px){.nd-hero-trust{justify-content:flex-start;}}
    .nd-trust-item{display:flex;flex-direction:column;}
    .nd-trust-num{font-size:1.1rem;font-weight:700;color:#5DCAA5;}
    .nd-trust-label{font-size:.6rem;color:rgba(255,255,255,.5);}
    .nd-trust-sep{width:1px;height:30px;background:rgba(255,255,255,.2);}
    .nd-hero-scroll{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:.3rem;color:rgba(255,255,255,.3);font-size:.65rem;letter-spacing:.1em;animation:scrollBounce 2s ease-in-out infinite;}
    .nd-hero-scroll::after{content:'↓';font-size:1rem;}
    @keyframes scrollBounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}
    .nd-hero-mockup{position:relative;z-index:2;flex:0 0 380px;height:480px;}
    .mockup-block{position:absolute;background:rgba(13,32,24,.9);backdrop-filter:blur(12px);border:1px solid rgba(29,158,117,.3);border-radius:20px;padding:1rem;animation:floatBase 4s ease-in-out infinite;}
    .mockup-block:hover{transform:translateY(-6px) !important;border-color:#1D9E75;}
    @keyframes floatBase{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
    .nd-mc-1{top:0;left:0;right:0;animation-delay:0s;}
    .nd-mc-2{bottom:20px;left:0;width:140px;text-align:center;animation-delay:.5s;}
    .nd-mc-3{bottom:60px;right:0;width:120px;text-align:center;animation-delay:1s;}
    .plan-label{font-size:.7rem;color:#5DCAA5;font-weight:500;margin-bottom:.5rem;}
    .plan-meal{display:flex;justify-content:space-between;font-size:.7rem;color:rgba(255,255,255,.8);padding:.2rem 0;}
    .plan-kcal{color:#5DCAA5;}
    .plan-total{font-size:.6rem;color:rgba(255,255,255,.4);margin-top:.5rem;text-align:center;}
    .livraison-icon{width:36px;height:36px;background:#1D9E75;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;margin:0 auto .5rem;}
    .livraison-text{font-size:.7rem;color:rgba(255,255,255,.8);}
    .gratuit-title{font-size:1.2rem;font-weight:700;color:#5DCAA5;}
    .gratuit-sub{font-size:.6rem;color:rgba(255,255,255,.5);}
    @media(max-width:900px){.nd-hero{flex-direction:column;padding:6rem 1.5rem 3rem;}.nd-hero-mockup{display:none;}.nd-hero-content{max-width:100%;text-align:center;}}

    /* SECTIONS */
    .nd-section{padding:3rem 0;}
    .nd-section-light{background:var(--bg-secondary);}
    .nd-section-dark{background:#0d2018;}
    .nd-section-header{text-align:center;margin-bottom:2rem;}
    .nd-tag{display:inline-block;font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:#1D9E75;background:rgba(29,158,117,.1);padding:.2rem .8rem;border-radius:999px;margin-bottom:.75rem;}
    .nd-tag-light{color:#5DCAA5;background:rgba(93,202,165,.1);}
    .nd-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3vw,2.2rem);color:var(--text-primary);}
    .nd-title-light{color:#fff;}
    .nd-subtitle{font-size:.9rem;color:var(--text-secondary);margin-top:.5rem;max-width:520px;margin-left:auto;margin-right:auto;line-height:1.6;}
    .nd-subtitle-light{color:rgba(255,255,255,.55);}

    /* COMMENT CA MARCHE */
    .nd-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;text-align:center;}
    .nd-step-num{font-size:2.2rem;font-weight:800;color:#1D9E75;background:rgba(29,158,117,.12);display:inline-block;width:55px;height:55px;border-radius:50%;text-align:center;line-height:55px;margin-bottom:.75rem;}
    .nd-step h3{font-size:.9rem;margin-bottom:.5rem;color:var(--text-primary);}
    .nd-step p{font-size:.75rem;color:var(--text-secondary);line-height:1.6;}
    .nd-step-link{font-size:.75rem;color:#1D9E75;text-decoration:none;display:inline-block;margin-top:.5rem;}
    @media(max-width:768px){.nd-steps{grid-template-columns:1fr 1fr;gap:1.5rem;}}
    @media(max-width:480px){.nd-steps{grid-template-columns:1fr;}}

    /* DIFFERENCE */
    .nd-diff-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;}
    .nd-diff-card{background:rgba(255,255,255,.05);border:1px solid rgba(29,158,117,.15);border-radius:16px;padding:1.25rem;text-align:center;transition:transform .3s;}
    .nd-diff-card:hover{transform:translateY(-4px);border-color:#1D9E75;}
    .nd-diff-icon{width:44px;height:44px;background:#1D9E75;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.2rem;color:#fff;}
    .nd-diff-card h3{font-size:.85rem;margin-bottom:.5rem;color:#fff;}
    .nd-diff-card p{font-size:.7rem;color:rgba(255,255,255,.6);line-height:1.5;}
    @media(max-width:768px){.nd-diff-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:480px){.nd-diff-grid{grid-template-columns:1fr;}}

    /* 4 PROFILS */
    .nd-profils-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;}
    @media(max-width:1000px){.nd-profils-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:540px){.nd-profils-grid{grid-template-columns:1fr;}}
    .nd-profil-card{background:var(--bg-card);border:1.5px solid var(--border-color);border-radius:20px;padding:1.75rem 1.5rem;display:flex;flex-direction:column;gap:1rem;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative;overflow:hidden;}
    .nd-profil-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);border-color:#1D9E75;}
    .nd-profil-card.card-dark{background:linear-gradient(145deg,#0d2018,#1a3a2a);border-color:rgba(29,158,117,.35);}
    .nd-profil-card.card-soon{opacity:.72;}
    .nd-profil-card.card-soon:hover{transform:none;box-shadow:none;}
    .nd-profil-badge-soon{position:absolute;top:1rem;right:1rem;font-size:.6rem;background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3);border-radius:999px;padding:.15rem .6rem;text-transform:uppercase;letter-spacing:.08em;}
    .nd-profil-icon-wrap{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
    .icon-patient{background:rgba(29,158,117,.18);}
    .icon-diet{background:rgba(93,202,165,.15);}
    .icon-presc{background:rgba(24,95,165,.15);}
    .icon-partner{background:rgba(245,158,11,.1);}
    .nd-profil-card h3{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--text-primary);}
    .nd-profil-card.card-dark h3{color:#fff;}
    .nd-profil-card p{font-size:.78rem;color:var(--text-secondary);line-height:1.65;flex:1;}
    .nd-profil-card.card-dark p{color:rgba(255,255,255,.6);}
    .nd-profil-features{list-style:none;display:flex;flex-direction:column;gap:.3rem;}
    .nd-profil-features li{font-size:.73rem;color:var(--text-secondary);display:flex;align-items:flex-start;gap:.4rem;line-height:1.4;}
    .nd-profil-card.card-dark .nd-profil-features li{color:rgba(255,255,255,.65);}
    .nd-profil-features li::before{content:"✓";color:#1D9E75;font-weight:700;flex-shrink:0;}
    .nd-profil-btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.6rem 1.25rem;border-radius:999px;font-size:.8rem;font-weight:600;text-decoration:none;transition:all .2s;font-family:'Outfit',sans-serif;cursor:pointer;border:none;white-space:nowrap;}
    .btn-green{background:#1D9E75;color:#fff;}
    .btn-green:hover{background:#0f6e56;}
    .btn-outline{background:transparent;border:1.5px solid #1D9E75;color:#1D9E75;}
    .btn-outline:hover{background:rgba(29,158,117,.08);}
    .btn-disabled{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);color:rgba(255,255,255,.3);cursor:not-allowed;pointer-events:none;}

    /* TARIF SIMPLE */
    .nd-tarif-simple{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;max-width:800px;margin:0 auto;}
    @media(max-width:640px){.nd-tarif-simple{grid-template-columns:1fr;max-width:380px;}}
    .tarif-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:20px;padding:1.75rem;transition:transform .2s;}
    .tarif-card:hover{transform:translateY(-4px);}
    .tarif-card.tarif-featured{background:linear-gradient(135deg,#0d2018,#1a3a2a);border:2px solid #1D9E75;}
    .tarif-featured .tarif-label{color:#5DCAA5;}
    .tarif-prix{font-size:2.2rem;font-weight:800;color:#1D9E75;}
    .tarif-featured .tarif-prix{color:#5DCAA5;}
    .tarif-desc{font-size:.75rem;color:var(--text-secondary);margin:.25rem 0 1rem;}
    .tarif-featured .tarif-desc{color:rgba(255,255,255,.6);}
    .tarif-liste{list-style:none;margin-bottom:1.25rem;display:flex;flex-direction:column;gap:.4rem;}
    .tarif-liste li{font-size:.75rem;color:var(--text-primary);display:flex;align-items:flex-start;gap:.4rem;line-height:1.4;}
    .tarif-featured .tarif-liste li{color:rgba(255,255,255,.9);}
    .tarif-liste li::before{content:"✓";color:#1D9E75;font-weight:700;flex-shrink:0;}
    .tarif-note{text-align:center;margin-top:1.25rem;padding:.7rem 1rem;background:var(--green-light);border-radius:12px;max-width:620px;margin-left:auto;margin-right:auto;}
    .tarif-note p{font-size:.75rem;color:var(--green2);}
    @media(max-width:768px){.nd-testi-grid{grid-template-columns:1fr;}}
    .nd-testi-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;padding:1.5rem;transition:transform .2s;}
    .nd-testi-card:hover{transform:translateY(-3px);}
    .nd-testi-stars{color:#f59e0b;font-size:.85rem;margin-bottom:.75rem;}
    .nd-testi-quote{font-size:.82rem;color:var(--text-secondary);line-height:1.7;margin-bottom:1rem;font-style:italic;}
    .nd-testi-author{display:flex;align-items:center;gap:.75rem;}
    .nd-testi-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1D9E75,#0f6e56);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0;}
    .nd-testi-name{font-size:.78rem;font-weight:600;color:var(--text-primary);}
    .nd-testi-role{font-size:.68rem;color:var(--text-muted);}

    /* CTA FINAL */
    .nd-cta-final{background:linear-gradient(135deg,#0d2018,#0f4a33);border-radius:24px;padding:3rem 2rem;text-align:center;border:1px solid rgba(29,158,117,.3);position:relative;overflow:hidden;}
    .nd-cta-final::before{content:'';position:absolute;top:-80px;right:-80px;width:320px;height:320px;background:radial-gradient(circle,rgba(29,158,117,.15) 0%,transparent 70%);pointer-events:none;}
    .nd-cta-final h2{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,3vw,2rem);color:#fff;margin-bottom:.75rem;}
    .nd-cta-final p{font-size:.9rem;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto 2rem;line-height:1.7;}
    .nd-cta-final-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}

    /* FOOTER */
    .nd-footer{background:#080f0b;color:rgba(255,255,255,.5);padding:3rem 2rem 1.5rem;margin-top:3rem;}
    .nd-footer-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1.5fr 2fr;gap:2rem;}
    .nd-logo-footer{font-family:'Playfair Display',serif;font-size:1.2rem;color:#fff;margin-bottom:.5rem;}
    .nd-logo-footer em{font-style:italic;color:#5DCAA5;}
    .nd-footer-brand p{font-size:.7rem;line-height:1.6;max-width:280px;}
    .nd-footer-by{font-size:.65rem;color:rgba(255,255,255,.25);margin-top:.75rem;}
    .nd-footer-links{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
    .nd-footer-col-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);margin-bottom:.5rem;}
    .nd-footer-col a{display:block;font-size:.7rem;color:rgba(255,255,255,.5);text-decoration:none;margin-bottom:.3rem;}
    .nd-footer-col a:hover{color:#fff;}
    .nd-footer-bottom{text-align:center;font-size:.65rem;padding-top:2rem;margin-top:2rem;border-top:1px solid rgba(255,255,255,.05);}
    @media(max-width:768px){.nd-footer-inner{grid-template-columns:1fr;}.nd-footer-links{grid-template-columns:1fr 1fr;}}

    /* MISC */
    .scroll-top-btn{position:fixed;bottom:1rem;right:1rem;width:40px;height:40px;background:#1D9E75;color:#fff;border:none;border-radius:50%;cursor:pointer;opacity:0;transition:opacity .2s;z-index:200;}
    .scroll-top-btn.visible{opacity:1;}
    [data-reveal]{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease;}
    [data-reveal].revealed{opacity:1;transform:translateY(0);}
    .profil-modal-sub{text-align:center;color:var(--text-muted);margin-bottom:2rem;font-size:.9rem;}
  else{document.documentElement.setAttribute('data-theme','light');if(iconSpan)iconSpan.textContent='🌙';if(labelSpan)labelSpan.textContent='Sombre';localStorage.setItem('nutridoc_theme','light');}
    const html=document.documentElement,isDark=html.getAttribute('data-theme')==='dark';
    html.setAttribute('data-theme',isDark?'light':'dark');localStorage.setItem('nutridoc_theme',isDark?'light':'dark');
    if(iconSpan)iconSpan.textContent=isDark?'🌙':'☀️';if(labelSpan)labelSpan.textContent=isDark?'Sombre':'Clair';
    if(btn){btn.style.transform='scale(0.95)';setTimeout(()=>{if(btn)btn.style.transform='scale(1)';},150);}
  };
})();

const PROFIL_KEY='nutridoc_profil',PROFIL_DATE_KEY='nutridoc_profil_date',PROFIL_EXPIRY_DAYS=30;
const PROFILS={patient:{name:'Patient',icon:'🧑',redirectUrl:'accueil-patient.html'},dieteticien:{name:'Diététicien',icon:'🥗',redirectUrl:'accueil-dieteticien.html'},prescripteur:{name:'Prescripteur',icon:'🏢',redirectUrl:'accueil-prescripteur.html'},structure:{name:'Structure',icon:'🏛️',redirectUrl:'partenariats.html'}};
function getStoredProfil(){const p=localStorage.getItem(PROFIL_KEY),d=localStorage.getItem(PROFIL_DATE_KEY);if(!p||!d)return null;if((Date.now()-parseInt(d))/(1000*3600*24)>PROFIL_EXPIRY_DAYS){localStorage.removeItem(PROFIL_KEY);localStorage.removeItem(PROFIL_DATE_KEY);return null;}return p;}
function setStoredProfil(p){localStorage.setItem(PROFIL_KEY,p);localStorage.setItem(PROFIL_DATE_KEY,Date.now().toString());}
function updateUIForProfil(k){const p=PROFILS[k];if(!p)return;const bar=document.getElementById('dynamicProfilBar');if(bar){bar.style.display='block';document.getElementById('profilIcon').textContent=p.icon;document.getElementById('profilName').textContent=p.name;}}
function openProfilModal(){const c=document.getElementById('profilModalContainer');if(!c)return;c.innerHTML=`<div class="profil-modal-overlay" onclick="closeProfilModal(event)"><div class="profil-modal" onclick="event.stopPropagation()"><h2>Bienvenue sur NutriDoc</h2><div class="profil-modal-sub">Je suis…</div><div class="profil-grid"><div class="profil-card" >Ne plus afficher</button></div></div></div>`;}
function closeProfilModal(){document.getElementById('profilModalContainer').innerHTML='';}
function dismissProfilForever(){localStorage.setItem('nutridoc_profil_dismissed','true');closeProfilModal();}
function selectProfil(k){if(!PROFILS[k])return;setStoredProfil(k);updateUIForProfil(k);closeProfilModal();const t=PROFILS[k].redirectUrl;if(t!=='index.html'&&!window.location.pathname.includes(t))window.location.href=t;}
function initProfilSystem(){const d=localStorage.getItem('nutridoc_profil_dismissed'),s=getStoredProfil();if(s){updateUIForProfil(s);return;}if(!d){setTimeout(openProfilModal,2500);}}
window.selectProfil=selectProfil;window.closeProfilModal=closeProfilModal;window.dismissProfilForever=dismissProfilForever;window.openProfilModal=openProfilModal;
window.toggleConn=()=>document.getElementById('ndConnMenu')?.classList.toggle('open');
document.addEventListener('click',(e)=>{const w=document.getElementById('ndConnWrap'),m=document.getElementById('ndConnMenu');if(w&&m&&!w.contains(e.target))m.classList.remove('open');});
const observer=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('revealed');});},{threshold:0.1});
document.querySelectorAll('[data-reveal]').forEach(el=>observer.observe(el));
window.addEventListener('scroll',()=>{document.getElementById('ndHeader')?.classList.toggle('scrolled',window.scrollY>50);document.getElementById('scrollTopBtn')?.classList.toggle('visible',window.scrollY>300);});
if(typeof initAutoSave==='function')initAutoSave();
</script>
</body>
</html>
